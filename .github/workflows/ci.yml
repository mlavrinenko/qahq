name: CI

# Runs on every push/PR. No paths-ignore: a required check that never triggers
# would block merges forever, and the job is cheap once the caches are warm.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: ~

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Actions pinned: first-party to immutable release tags, third-party to commit
# SHAs. Bump with Dependabot's `github-actions` ecosystem.
jobs:
  build:
    name: Build & cache
    runs-on: ubuntu-latest
    env:
      # Exposed so the Cachix step can be skipped until the token exists (secrets
      # can't be referenced directly in `if:`).
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      # Caches /nix through the GitHub Actions cache (no external account).
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/flake.lock', '**/*.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      # Pushes every path built below to the public binary cache so consumers
      # pull prebuilt binaries. Skipped until CACHIX_AUTH_TOKEN is set (see
      # README "Binary cache").
      - name: Use Cachix
        if: env.CACHIX_AUTH_TOKEN != ''
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: qahq
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Flake check
        run: nix flake check --print-build-logs

      # Builds the whole stack (bundle pulls every tool). Cachix pushes the
      # results if the step above ran.
      - name: Build all tools
        run: nix build --print-build-logs .#default
